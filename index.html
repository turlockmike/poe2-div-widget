<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="refresh" content="120">
<title>PoE2 Divs</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0d0f14; color:#f5e9c8;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif; -webkit-text-size-adjust:100%; }
  .wrap { min-height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:16px; box-sizing:border-box; }
  .big { font-size:22vw; line-height:1; font-weight:800; color:#ffd66b;
    text-shadow:0 0 18px rgba(255,197,66,.35); }
  .sub { font-size:5vw; opacity:.85; margin-top:.2em; letter-spacing:.02em; }
  .tot { font-size:4.2vw; opacity:.7; margin-top:.6em; }
  .spark { font-size:3.6vw; opacity:.55; margin-top:.4em; letter-spacing:.15em; }
  .chart { width:96%; max-width:420px; margin-top:14px; border-radius:12px; }
  .ts { font-size:3.2vw; opacity:.4; margin-top:.8em; }
  @media (min-width:360px){ .big{font-size:84px} .sub{font-size:19px}
    .tot{font-size:16px} .spark{font-size:14px} .ts{font-size:12px} }
</style></head>
<body><div class="wrap">
  <div class="big">—</div>
  <div class="sub">log your first div total</div>
  <div class="tot">no readings yet</div>
  <div class="spark">—</div>
  
  <div class="ts">updated </div>
</div></body></html>
